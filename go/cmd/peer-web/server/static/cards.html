<!doctype html>
<html lang=en>
<meta charset=utf-8>
<title>__TITLE__</title>
<meta name=viewport content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
  /* Linear-derivative design system
     ─────────────────────────────────────────────────────────
     Palette, type, and elevation cribbed from getdesign.md/linear.app.
     Inter Variable + cv01/ss03 OpenType features are the identity. */

  :root {
    /* Surfaces — luminance stacking, never solid */
    --bg-marketing: #08090a;     /* page canvas */
    --bg-panel: #0f1011;         /* panels, sticky header */
    --bg-elevated: #191a1b;      /* drawer, modals, dropdowns */
    --bg-card: rgba(255,255,255,0.02);
    --bg-card-hover: rgba(255,255,255,0.05);
    --bg-inset: rgba(0,0,0,0.25);

    /* Text — never pure white */
    --fg-primary: #f7f8f8;
    --fg-secondary: #d0d6e0;
    --fg-tertiary: #8a8f98;
    --fg-quaternary: #62666d;

    /* Borders — semi-transparent white only */
    --border-subtle: rgba(255,255,255,0.05);
    --border-standard: rgba(255,255,255,0.08);
    --border-emphasis: rgba(255,255,255,0.12);

    /* Brand — the only chromatic color */
    --accent-bg: #5e6ad2;
    --accent: #7170ff;
    --accent-hover: #828fff;
    --accent-soft: rgba(113,112,255,0.10);

    /* Status — Linear's issue palette */
    --status-todo: #8a8f98;        /* Backlog/Todo gray */
    --status-in-progress: #f2c94c; /* Linear's in-progress amber */
    --status-in-review: #5e6ad2;   /* indigo for review */
    --status-done: #4cb782;        /* Linear's done green */
    --status-cancelled: #62666d;   /* muted gray */

    /* Multi-layer shadow (dialog elevation) */
    --shadow-dialog:
      rgba(0,0,0,0.00) 0px 8px 2px,
      rgba(0,0,0,0.01) 0px 5px 2px,
      rgba(0,0,0,0.04) 0px 3px 2px,
      rgba(0,0,0,0.07) 0px 1px 1px,
      rgba(0,0,0,0.50) 0px 16px 32px -8px;
  }

  * { box-sizing: border-box }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-marketing);
    color: var(--fg-secondary);
    font-family: 'Inter Variable', 'Inter', -apple-system, BlinkMacSystemFont,
      'SF Pro Display', system-ui, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    font-feature-settings: "cv01", "ss03";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border-subtle);
    position: sticky;
    top: 0;
    background: var(--bg-panel);
    z-index: 10;
    backdrop-filter: blur(8px);
  }
  header .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(113,112,255,0.6);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .4 } }
  header h1 {
    margin: 0;
    font-size: 13px;
    font-weight: 510;
    color: var(--fg-primary);
    letter-spacing: -0.13px;
  }
  header .sub {
    color: var(--fg-quaternary);
    font-size: 12px;
    font-weight: 510;
    margin-left: auto;
    letter-spacing: -0.13px;
  }
  header a {
    color: var(--fg-secondary);
    font-size: 12px;
    font-weight: 510;
    text-decoration: none;
    padding: 5px 11px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border-standard);
    border-radius: 6px;
    transition: background .12s, border-color .12s, color .12s;
  }
  header a:hover {
    color: var(--fg-primary);
    background: rgba(255,255,255,0.05);
    border-color: var(--border-emphasis);
  }

  /* ── Board grid ─────────────────────────────────────────────── */
  main.board {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 12px;
    padding: 16px 24px 24px;
    min-height: calc(100vh - 50px);
  }

  .col {
    background: transparent;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .col-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px 10px;
    margin-bottom: 8px;
  }
  .col-label {
    font-size: 12px;
    font-weight: 510;
    color: var(--fg-secondary);
    letter-spacing: -0.13px;
  }
  .col-status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    background: transparent;
  }
  .col.in_progress .col-status-dot {
    background: conic-gradient(var(--status-in-progress) 0% 60%, transparent 60% 100%);
    border-color: var(--status-in-progress);
  }
  .col.done .col-status-dot {
    background: var(--status-done);
    border-color: var(--status-done);
  }
  .col.cancelled .col-status-dot {
    background: var(--status-cancelled);
    border-color: var(--status-cancelled);
    opacity: .6;
  }
  .col.in_review .col-status-dot {
    background: var(--status-in-review);
    border-color: var(--status-in-review);
  }
  .col.todo .col-status-dot {
    border-color: var(--status-todo);
  }
  .col.todo .col-label { color: var(--fg-secondary); }
  .col.in_progress .col-label { color: var(--status-in-progress); }
  .col.in_review .col-label { color: var(--accent); }
  .col.done .col-label { color: var(--status-done); }
  .col.cancelled .col-label { color: var(--fg-quaternary); }

  .col-count {
    margin-left: auto;
    font-size: 12px;
    font-weight: 400;
    color: var(--fg-quaternary);
    letter-spacing: -0.13px;
  }
  .cards { display: flex; flex-direction: column; gap: 6px; }

  /* ── Card ───────────────────────────────────────────────────── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-standard);
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    transition: background .12s, border-color .12s, transform .12s;
    position: relative;
  }
  .card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-emphasis);
  }
  .card:focus-visible {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(113,112,255,0.18);
  }
  .card .title {
    font-size: 13px;
    line-height: 1.4;
    font-weight: 510;
    color: var(--fg-primary);
    margin: 0 0 6px;
    letter-spacing: -0.13px;
    word-wrap: break-word;
  }
  .card .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    font-size: 11px;
    font-weight: 510;
    color: var(--fg-tertiary);
    letter-spacing: -0.06px;
  }
  .card .meta .id {
    color: var(--fg-quaternary);
    font-family: 'Berkeley Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-weight: 400;
  }
  .card .meta .role { color: var(--accent); }
  .card .meta .who { color: var(--fg-secondary); }
  .card .meta .priority.high { color: #ef6f6f; }
  .card .meta .blocked { color: var(--status-in-progress); }
  .card .meta .ready { color: var(--status-done); }
  .card .tags {
    margin-top: 6px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .card .tag {
    font-size: 10px;
    font-weight: 510;
    padding: 1px 8px;
    border-radius: 9999px;
    background: transparent;
    color: var(--fg-secondary);
    border: 1px solid var(--border-standard);
  }

  /* Status accent — left bar (Linear-style indicator) */
  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 8px; bottom: 8px;
    width: 2px;
    border-radius: 2px;
    background: transparent;
    transition: background .12s;
  }
  .card.in_progress::before { background: var(--status-in-progress); }
  .card.in_review::before   { background: var(--status-in-review); }
  .card.done::before        { background: var(--status-done); }
  .card.cancelled::before   { background: var(--status-cancelled); opacity: .6; }
  .card.todo.ready::before  { background: var(--status-done); opacity: .55; }

  /* Right-edge pip for ready/blocked todos */
  .card .pip {
    position: absolute;
    top: 11px;
    right: 11px;
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .card.todo.ready .pip {
    background: var(--status-done);
    box-shadow: 0 0 6px rgba(76,183,130,0.55);
  }
  .card.todo.blocked .pip {
    border: 1.5px solid var(--status-in-progress);
    background: transparent;
  }

  .empty {
    color: var(--fg-quaternary);
    font-size: 12px;
    font-weight: 400;
    padding: 6px 4px;
    letter-spacing: -0.13px;
  }

  /* ── Responsive ─────────────────────────────────────────────── */
  @media (max-width: 1000px) {
    main.board { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 560px) {
    main.board { grid-template-columns: 1fr; padding: 12px; }
    header { padding: 10px 16px; }
  }

  /* ── Detail drawer ──────────────────────────────────────────── */
  .backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    z-index: 50;
    backdrop-filter: blur(2px);
  }
  .backdrop.open { display: block; }

  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(580px, 100vw);
    background: var(--bg-elevated);
    border-left: 1px solid var(--border-standard);
    display: none;
    flex-direction: column;
    z-index: 60;
    box-shadow: var(--shadow-dialog);
  }
  .drawer.open { display: flex; }

  .drawer .dh {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .drawer .dh .id {
    color: var(--fg-quaternary);
    font-family: 'Berkeley Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 12px;
    font-weight: 400;
  }
  .drawer .dh .status-pill {
    font-size: 11px;
    font-weight: 510;
    padding: 3px 10px;
    border-radius: 9999px;
    background: transparent;
    border: 1px solid var(--border-standard);
    letter-spacing: -0.06px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .drawer .dh .status-pill::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }
  .drawer .dh .status-pill.todo { color: var(--status-todo); }
  .drawer .dh .status-pill.in_progress { color: var(--status-in-progress); }
  .drawer .dh .status-pill.in_review { color: var(--status-in-review); }
  .drawer .dh .status-pill.done { color: var(--status-done); }
  .drawer .dh .status-pill.cancelled { color: var(--status-cancelled); }

  .drawer .dh .close {
    margin-left: auto;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border-standard);
    color: var(--fg-tertiary);
    font-size: 18px;
    line-height: 1;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .drawer .dh .close:hover {
    color: var(--fg-primary);
    background: rgba(255,255,255,0.05);
    border-color: var(--border-emphasis);
  }

  .drawer .db {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }
  .drawer h2 {
    margin: 0 0 12px;
    font-size: 20px;
    line-height: 1.3;
    font-weight: 590;
    color: var(--fg-primary);
    letter-spacing: -0.24px;
  }

  .drawer .field { margin: 18px 0 0; }
  .drawer .label {
    font-size: 11px;
    font-weight: 510;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--fg-quaternary);
    margin-bottom: 6px;
  }
  .drawer .value {
    font-size: 13px;
    color: var(--fg-secondary);
    word-wrap: break-word;
    letter-spacing: -0.13px;
  }
  .drawer .value.mono {
    font-family: 'Berkeley Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 12px;
    color: var(--fg-tertiary);
    font-weight: 400;
  }

  .drawer .body-md {
    white-space: pre-wrap;
    background: rgba(0,0,0,0.30);
    border: 1px solid var(--border-subtle);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--fg-secondary);
  }

  .drawer .grid2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 18px;
  }

  .drawer .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 510;
    padding: 2px 10px 2px 8px;
    border-radius: 9999px;
    background: transparent;
    color: var(--fg-secondary);
    border: 1px solid var(--border-standard);
    margin: 3px 4px 0 0;
    letter-spacing: -0.06px;
    cursor: default;
  }
  .drawer .chip[data-jump] { cursor: pointer; transition: background .12s, border-color .12s; }
  .drawer .chip[data-jump]:hover {
    background: rgba(255,255,255,0.04);
    border-color: var(--border-emphasis);
  }
  .drawer .chip.dep::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--status-in-progress);
  }
  .drawer .chip.dep.done::before {
    background: var(--status-done);
  }

  .drawer .empty {
    color: var(--fg-quaternary);
    font-style: normal;
    font-size: 12px;
  }

  .drawer pre {
    margin: 0;
    white-space: pre-wrap;
    background: rgba(0,0,0,0.30);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 11px;
    color: var(--fg-tertiary);
  }

  /* Drag-and-drop affordances */
  .card[draggable="true"] { cursor: grab; }
  .card.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }
  .col.drop-target .cards {
    background: rgba(113,112,255,0.06);
    border: 1px dashed var(--accent);
    border-radius: 8px;
    margin: -4px;
    padding: 4px;
  }

  /* Toast (transient feedback for drop result) */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elevated);
    border: 1px solid var(--border-emphasis);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 510;
    color: var(--fg-primary);
    letter-spacing: -0.13px;
    box-shadow: var(--shadow-dialog);
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s, transform .15s;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(-4px);
  }
  .toast.error { border-color: rgba(239,111,111,0.4); color: #ef6f6f; }
  .toast.ok { border-color: rgba(76,183,130,0.4); }

  /* Header New-card button */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--accent);
    color: #fff;
    font-size: 12px; font-weight: 510;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.10);
    cursor: pointer;
    transition: background .12s;
    letter-spacing: -0.13px;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary .plus { font-size: 14px; line-height: 1; opacity: .85; }

  /* Header Start/Stop board buttons */
  .btn-board {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit;
    font-size: 12px; font-weight: 510;
    padding: 5px 11px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: -0.13px;
    transition: background .12s, border-color .12s, color .12s;
  }
  .btn-board.start {
    background: rgba(76,183,130,0.10);
    border: 1px solid rgba(76,183,130,0.35);
    color: var(--status-done);
  }
  .btn-board.start:hover {
    background: rgba(76,183,130,0.18);
    border-color: rgba(76,183,130,0.55);
  }
  .btn-board.stop {
    background: rgba(239,111,111,0.10);
    border: 1px solid rgba(239,111,111,0.35);
    color: #ef6f6f;
  }
  .btn-board.stop:hover {
    background: rgba(239,111,111,0.18);
    border-color: rgba(239,111,111,0.55);
  }
  .btn-board:disabled { opacity: .5; cursor: not-allowed; }
  .btn-board .glyph { font-size: 11px; line-height: 1; }
  .drain-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 510;
    padding: 3px 9px;
    border-radius: 9999px;
    background: rgba(76,183,130,0.10);
    border: 1px solid rgba(76,183,130,0.30);
    color: var(--status-done);
    letter-spacing: -0.06px;
  }
  .drain-status::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
    animation: pulse 1.4s infinite;
  }
  .drain-promote-toggle {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--fg-tertiary);
    cursor: pointer;
    user-select: none;
  }
  .drain-promote-toggle input { margin: 0; }

  /* Modal (shared with cards-index.html) */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    z-index: 70;
    backdrop-filter: blur(2px);
  }
  .modal-backdrop.open { display: block; }
  .modal {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(540px, 92vw);
    max-height: 86vh;
    overflow: hidden;
    background: var(--bg-elevated);
    border: 1px solid var(--border-standard);
    border-radius: 12px;
    box-shadow: var(--shadow-dialog);
    display: none;
    flex-direction: column;
    z-index: 80;
  }
  .modal.open { display: flex; }
  .modal .mh {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .modal .mh .title {
    font-size: 14px; font-weight: 510;
    color: var(--fg-primary);
    letter-spacing: -0.13px;
  }
  .modal .mh .close {
    margin-left: auto;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border-standard);
    color: var(--fg-tertiary);
    font-size: 18px; line-height: 1;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
  }
  .modal .mh .close:hover { color: var(--fg-primary); }
  .modal .mb {
    padding: 16px 18px 18px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 12px;
  }
  .modal label {
    display: block;
    font-size: 11px; font-weight: 510;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--fg-quaternary);
    margin-bottom: 4px;
  }
  .modal input, .modal textarea, .modal select {
    width: 100%;
    background: rgba(0,0,0,0.30);
    color: var(--fg-primary);
    border: 1px solid var(--border-standard);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.45;
    font-feature-settings: "cv01", "ss03";
    letter-spacing: -0.13px;
    transition: border-color .12s, background .12s;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(0,0,0,0.45);
  }
  .modal textarea { resize: vertical; min-height: 90px; max-height: 360px; }
  .modal .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal .actions {
    display: flex; gap: 8px; justify-content: flex-end;
    padding: 12px 18px;
    border-top: 1px solid var(--border-subtle);
    background: rgba(0,0,0,0.20);
  }
  .modal .btn {
    font-family: inherit;
    font-size: 12px; font-weight: 510;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: -0.13px;
  }
  .modal .btn.ghost {
    background: rgba(255,255,255,0.02);
    color: var(--fg-secondary);
    border: 1px solid var(--border-standard);
  }
  .modal .btn.ghost:hover {
    color: var(--fg-primary);
    background: rgba(255,255,255,0.05);
  }
  .modal .btn.primary {
    background: var(--accent);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .modal .btn.primary:hover { background: var(--accent-hover); }
  .modal .btn.primary:disabled { opacity: .5; cursor: not-allowed; }
  .modal .err {
    color: #ef6f6f;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 6px;
    background: rgba(239,111,111,0.08);
    border: 1px solid rgba(239,111,111,0.30);
    display: none;
  }
  .modal .err.show { display: block; }

  /* Inline body edit affordance in the drawer */
  .drawer .body-edit-wrap {
    display: flex; flex-direction: column; gap: 8px;
  }
  .drawer .body-edit-wrap textarea {
    width: 100%;

<header>

    auto-promote
  </label>
  <button class="btn-board start" id=btn-board-start><span class=glyph>▶</span> Start board</button>

        placeholder="Short, action-oriented (an agent can refine the body)">

        placeholder="Rough notes are fine — claim it to an agent and ask them to flesh out the spec."></textarea>

<script>
(() => {
  const params = new URLSearchParams(location.search);
  const pairKey = params.get('pair_key');
  if (!pairKey) {
    document.getElementById('board').innerHTML =
      '<div style="padding:24px;color:var(--fg-tertiary);font-size:13px">Pass <code style="color:var(--accent);font-family:ui-monospace,SF Mono,Menlo,monospace">?pair_key=K</code></div>';
    return;
  }

  const STATUSES = ['todo','in_progress','in_review','done','cancelled'];
  const LABELS = {
    todo:'Todo', in_progress:'In Progress', in_review:'In Review',
    done:'Done', cancelled:'Cancelled'
  };

  const board = document.getElementById('board');
  const statusEl = document.getElementById('status');

  // Pre-render 5 empty columns — refresh just repopulates .cards inside each.
  for (const s of STATUSES) {
    const col = document.createElement('section');
    col.className = 'col ' + s;
    col.innerHTML = `
      <div class="col-head">
        <span class="col-status-dot"></span>
        <span class="col-label">${LABELS[s]}</span>
        <span class="col-count" data-count="${s}">0</span>
      </div>
      <div class="cards" data-cards="${s}"></div>`;
    board.appendChild(col);
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderCard(c) {
    const isTodo = c.status === 'todo';
    const pip = isTodo && c.ready ? 'ready' :
                isTodo && (c.blocker_ids || []).length > 0 ? 'blocked' : '';
    const cls = ['card', c.status, pip].filter(Boolean).join(' ');

    const parts = [];
    parts.push(`<span class="id">#${c.id}</span>`);
    if (c.priority === 1) {
      parts.push(`<span class="priority high">⚑ priority</span>`);
    } else if (c.priority === -1) {
      parts.push(`<span class="priority">low</span>`);
    }
    if (c.needs_role) parts.push(`<span class="role">needs ${esc(c.needs_role)}</span>`);
    if (c.claimed_by) parts.push(`<span class="who">${esc(c.claimed_by)}</span>`);
    if (isTodo) {
      if (c.ready) {
        parts.push(`<span class="ready">ready</span>`);
      } else if ((c.blocker_ids || []).length > 0) {
        parts.push(`<span class="blocked">blocked by #${c.blocker_ids.join(', #')}</span>`);
      }
    }

    let tags = '';
    if (Array.isArray(c.tags) && c.tags.length) {
      tags = '<div class="tags">' +
        c.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('') +
        '</div>';
    }

    return `
      <article class="${cls}" data-card-id="${c.id}" data-current-status="${c.status}" tabindex="0" draggable="true">
        ${pip ? '<span class="pip"></span>' : ''}
        <div class="title">${esc(c.title)}</div>
        <div class="meta">${parts.join(' ')}</div>
        ${tags}
      </article>`;
  }

  // --- Detail drawer ---------------------------------------------------------
  const drawer = document.getElementById('drawer');
  const backdrop = document.getElementById('backdrop');
  let openCardId = null;
  let lastData = null;  // last /api/cards response, used by drawer re-render

  function fmtTs(s) {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return s;
    return d.toLocaleString();
  }

  function depChip(id, byId) {
    const c = byId[id];
    if (!c) return `<span class="chip dep">#${id}</span>`;
    const cls = c.status === 'done' ? 'chip dep done' : 'chip dep';
    return `<span class="${cls}" data-jump="${id}" title="${esc(c.title)} — ${c.status}">#${id} ${esc(c.title)}</span>`;
  }

  function renderDrawer(c, byId) {
    // Preserve per-render-volatile state so a forced re-render
    // (status change, body update from worker, etc.) doesn't yank
    // the user out of what they were doing.
    const dbScroll = (drawer.querySelector('.db') || {}).scrollTop || 0;
    const composerVal = (drawer.querySelector('#comment-input') || {}).value;
    const composerAuthor = (drawer.querySelector('#comment-author') || {}).value;

    const blockers = (c.blocker_ids || []);
    const blockees = (c.blockee_ids || []);
    const tags = Array.isArray(c.tags) ? c.tags : [];
    const ctxRefs = c.context_refs || null;

    const isTodo = c.status === 'todo';
    const readiness = isTodo
      ? (c.ready
          ? '<span class="state-pill ready">Ready</span>'
          : `<span class="state-pill blocked">Blocked by ${blockers.length} card${blockers.length === 1 ? '' : 's'}</span>`)
      : '';

    // Restore preserved state after innerHTML rewrite (deferred to
    // end of function via setTimeout 0 / requestAnimationFrame).
    setTimeout(() => {
      const db = drawer.querySelector('.db');
      if (db) db.scrollTop = dbScroll;
      const ci = drawer.querySelector('#comment-input');
      if (ci && composerVal) ci.value = composerVal;
      const ca = drawer.querySelector('#comment-author');
      if (ca && composerAuthor) ca.value = composerAuthor;
    }, 0);

    const canRun = isTodo && c.ready && !c.claimed_by;
    const runBtn = canRun
      ? `<button class="run-btn" id=drawer-run title="Spawn a headless claude -p worker for this card">
           <span class=glyph>▶</span> Run
         </button>`
      : '';

    drawer.innerHTML = `
      <div class="dh">
        <span class="id">#${c.id}</span>
        <span class="status-pill ${c.status}">${LABELS[c.status] || c.status}</span>
        ${runBtn}
        <button class="close" id=drawer-close aria-label="close" style="margin-left:auto">×</button>
      </div>
      <div class="db">
        <h2>${esc(c.title)}</h2>
        ${readiness ? `<div class="field">${readiness}</div>` : ''}

        <div class="field body-edit-target">
          <div class="label">spec / body
            <button class="edit-link" data-action="edit-body" type="button">edit</button>
          </div>
          ${c.body ? `<div class="body-md">${esc(c.body)}</div>`
                   : '<div class="empty">(no body — click edit to add)</div>'}
        </div>

        <div class="field grid2">
          <div>
            <div class="label">created by</div>
            <div class="value">${esc(c.created_by || '—')}</div>
          </div>
          <div>
            <div class="label">claimed by</div>
            <div class="value">${esc(c.claimed_by || '—')}</div>
          </div>
          <div>
            <div class="label">needs role</div>
            <div class="value">${esc(c.needs_role || '—')}</div>
          </div>
          <div>
            <div class="label">priority</div>
            <div class="value">${
              c.priority === 1 ? '⚑ high' :
              c.priority === -1 ? 'low' : 'normal'
            }</div>
          </div>
        </div>

        <div class="field grid2">
          <div>
            <div class="label">created</div>
            <div class="value mono">${esc(fmtTs(c.created_at))}</div>
          </div>
          <div>
            <div class="label">updated</div>
            <div class="value mono">${esc(fmtTs(c.updated_at))}</div>
          </div>
          ${c.claimed_at ? `<div>
            <div class="label">claimed</div>
            <div class="value mono">${esc(fmtTs(c.claimed_at))}</div>
          </div>` : ''}
          ${c.completed_at ? `<div>
            <div class="label">completed</div>
            <div class="value mono">${esc(fmtTs(c.completed_at))}</div>
          </div>` : ''}
        </div>

        <div class="field">
          <div class="label">blocked by (${blockers.length})</div>
          <div class="value">${
            blockers.length ? blockers.map(id => depChip(id, byId)).join('')
                            : '<span class="empty">(none)</span>'
          }</div>
        </div>

        <div class="field">
          <div class="label">blocks (${blockees.length})</div>
          <div class="value">${
            blockees.length ? blockees.map(id => depChip(id, byId)).join('')
                            : '<span class="empty">(none)</span>'
          }</div>
        </div>

        <div class="field">
          <div class="label">tags</div>
          <div class="value">${
            tags.length ? tags.map(t => `<span class="chip">${esc(t)}</span>`).join('')
                        : '<span class="empty">(none)</span>'
          }</div>
        </div>

        ${ctxRefs ? `<div class="field">
          <div class="label">context refs (raw)</div>
          <div class="value mono"><pre style="margin:0;white-space:pre-wrap;background:rgba(0,0,0,0.30);border:1px solid var(--border-subtle);border-radius:4px;padding:8px 10px;font-size:11px">${esc(JSON.stringify(ctxRefs, null, 2))}</pre></div>
        </div>` : ''}

        <div class="activity-panel" id="activity-panel" data-card-id="${c.id}">
          <div class="activity-head">
            <span class="label">Activity</span>
            <span class="count" id="activity-count">…</span>
          </div>
          <div class="activity-list" id="activity-list">
            <div class="activity-empty">Loading…</div>
          </div>
          <div class="activity-composer">
            <textarea id="comment-input" placeholder="Comment on this card (markdown supported, ⌘/Ctrl+Enter to post)"></textarea>
            <div class="row">
              <input type="text" class="author" id="comment-author" placeholder="owner" value="owner">
              <button type="button" class="submit" id="comment-submit">Post comment</button>
            </div>
          </div>
        </div>

        <div class="ctx-panel" id="ctx-panel" data-card-id="${c.id}">
          <div class="ctx-head">
            <span class="ctx-title">Context</span>
            <span class="ctx-stats" id="ctx-stats">${ctxRefs ? 'click resolve' : 'no refs'}</span>
            ${ctxRefs ? '<button class="ctx-resolve" id="ctx-resolve">Resolve</button>' : ''}
          </div>
          <div class="ctx-body" id="ctx-body">
            ${ctxRefs
              ? '<div class="ctx-empty">Click <strong>Resolve</strong> to fetch files, urls, msgs, cards.</div>'
              : '<div class="ctx-empty">No context_refs on this card. Add files/urls/msg_ids/cards refs to give workers the context they need.</div>'}
          </div>
        </div>

        <div class="field">
          <div class="label">scope</div>
          <div class="value mono">${esc(c.pair_key)} · home_host=${esc(c.home_host || '—')}</div>
        </div>
      </div>`;

    drawer.querySelector('#drawer-close')
      .addEventListener('click', closeDrawer);
    drawer.querySelectorAll('[data-jump]').forEach(el => {
      el.addEventListener('click', () => {
        const jumpId = parseInt(el.dataset.jump, 10);
        if (jumpId) openDrawer(jumpId);
      });
    });
  }

  function openDrawer(id) {
    if (!lastData) return;
    const byId = Object.fromEntries((lastData.cards || []).map(c => [c.id, c]));
    const c = byId[id];
    if (!c) return;
    openCardId = id;
    // Reset dedup so the first paint always renders.
    lastDrawerSig = drawerSig(c);
    lastActivitySig = null;
    renderDrawer(c, byId);
    drawer.classList.add('open');
    drawer.setAttribute('aria-hidden', 'false');
    backdrop.classList.add('open');
    refreshActivity(id);
  }

  function closeDrawer() {
    openCardId = null;
    lastDrawerSig = null;
    lastActivitySig = null;
    drawer.classList.remove('open');
    drawer.setAttribute('aria-hidden', 'true');
    backdrop.classList.remove('open');
  }

  backdrop.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && openCardId !== null) closeDrawer();
  });

  // Click delegation on the board (cards re-render every 3s, so listen on parent)
  board.addEventListener('click', e => {
    if (suppressNextClick) return;
    const card = e.target.closest('[data-card-id]');
    if (!card) return;
    const id = parseInt(card.dataset.cardId, 10);
    if (id) openDrawer(id);
  });
  board.addEventListener('keydown', e => {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const card = e.target.closest('[data-card-id]');
    if (!card) return;
    e.preventDefault();
    const id = parseInt(card.dataset.cardId, 10);
    if (id) openDrawer(id);
  });

  // --- Drag and drop (status transitions) ---------------------------------
  // pendingTransitions tracks card_ids whose POST is in flight. The next
  // refresh() will not re-render those cards until the POST resolves, so the
  // optimistic move doesn't snap back mid-flight from a stale poll.
  const pendingTransitions = new Set();
  const toastEl = document.getElementById('toast');
  let toastTimer = null;

  function showToast(msg, kind) {
    toastEl.textContent = msg;
    toastEl.className = 'toast show' + (kind ? ' ' + kind : '');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toastEl.classList.remove('show');
    }, 2400);
  }

  // Suppress the synthetic click that follows a drag (avoids the drawer
  // popping open after a drop on Webkit/Blink).
  let suppressNextClick = false;

  board.addEventListener('dragstart', e => {
    const card = e.target.closest('[data-card-id]');
    if (!card) return;
    const id = card.dataset.cardId;
    const fromStatus = card.dataset.currentStatus;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/card-id', id);
    e.dataTransfer.setData('text/from-status', fromStatus);
    card.classList.add('dragging');
  });

  board.addEventListener('dragend', e => {
    const card = e.target.closest('[data-card-id]');
    if (card) card.classList.remove('dragging');
    document.querySelectorAll('.col.drop-target').forEach(c =>
      c.classList.remove('drop-target'));
    suppressNextClick = true;
    setTimeout(() => { suppressNextClick = false; }, 50);
  });

  STATUSES.forEach(s => {
    const col = document.querySelector('.col.' + s);
    if (!col) return;
    col.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.classList.add('drop-target');
    });
    col.addEventListener('dragleave', e => {
      // Only clear if we left the column entirely, not when crossing into a child.
      if (!col.contains(e.relatedTarget)) col.classList.remove('drop-target');
    });
    col.addEventListener('drop', async e => {
      e.preventDefault();
      col.classList.remove('drop-target');
      const id = parseInt(e.dataTransfer.getData('text/card-id'), 10);
      const fromStatus = e.dataTransfer.getData('text/from-status');
      if (!id || !fromStatus || fromStatus === s) return;

      const cardEl = document.querySelector(`[data-card-id="${id}"]`);
      const targetCards = col.querySelector('.cards');

      // Optimistic move: physically relocate the DOM node.
      pendingTransitions.add(id);
      if (cardEl && targetCards) {
        // Remove "(none)" empty placeholder if dropping into an empty column.
        const empty = targetCards.querySelector('.empty');
        if (empty) empty.remove();
        targetCards.appendChild(cardEl);
        cardEl.dataset.currentStatus = s;
        // Update the status accent bar by reclassing.
        cardEl.className = cardEl.className
          .replace(/\b(?:todo|in_progress|in_review|done|cancelled)\b/g, '')
          .trim() + ' ' + s;
      }

      try {
        const resp = await fetch(`/api/cards/${id}/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: s }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.error || ('HTTP ' + resp.status));
        }
        showToast(`#${id} → ${LABELS[s]}`, 'ok');
        // Trigger an immediate refresh so derived fields (ready, completed_at)
        // and any newly unblocked dependents update.
        refresh();
      } catch (err) {
        showToast(`Move failed: ${err.message}`, 'error');
        // Revert: refresh from server state will repaint authoritative columns.
        refresh();
      } finally {
        pendingTransitions.delete(id);
      }
    });
  });

  async function refresh() {
    try {
      const r = await fetch('/api/cards?pair_key=' + encodeURIComponent(pairKey),
                            { cache:'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      lastData = data;
      const cards = data.cards || [];
      const byId = Object.fromEntries(cards.map(c => [c.id, c]));

      // If the drawer is open, refresh ONLY when the card's mutable
      // fields have actually changed. A blind re-render on every 3s
      // poll resets scroll position, wipes the composer textarea, and
      // collapses any open ctx-panel sections. Same for activity —
      // refreshActivity has its own dedup that no-ops on identical
      // event lists.
      if (openCardId !== null && byId[openCardId]) {
        const c = byId[openCardId];
        const sig = drawerSig(c);
        if (sig !== lastDrawerSig) {
          lastDrawerSig = sig;
          renderDrawer(c, byId);
        }
        refreshActivity(openCardId);
      }

      // Skip the rebuild when a drag is in flight — the optimistic DOM move
      // is the source of truth until the POST resolves, and a poll landing
      // mid-flight would otherwise snap the card back.
      if (pendingTransitions.size === 0) {
        for (const s of STATUSES) {
          const ids = (data.by_status && data.by_status[s]) || [];
          const list = ids.map(id => byId[id]).filter(Boolean);
          const target = document.querySelector(`[data-cards="${s}"]`);
          if (!target) continue;
          target.innerHTML = list.length
            ? list.map(renderCard).join('')
            : '<div class="empty">(none)</div>';
          const countEl = document.querySelector(`[data-count="${s}"]`);
          if (countEl) countEl.textContent = list.length;
        }
      }
      statusEl.textContent = cards.length + ' cards · updated ' +
        new Date().toLocaleTimeString();
    } catch (e) {
      statusEl.textContent = 'refresh failed: ' + e.message;
    }
  }

  refresh();
  setInterval(refresh, 3000);

  // --- Global Start/Stop board (Shape B drainer) -------------------------
  const startBtn = document.getElementById('btn-board-start');
  const stopBtn = document.getElementById('btn-board-stop');
  const drainBadge = document.getElementById('drain-badge');
  const autoPromoteToggle = document.getElementById('drain-auto-promote');

  async function refreshBoardStatus() {
    try {
      const r = await fetch(`/api/boards/${encodeURIComponent(pairKey)}/status`,
        { cache: 'no-store' });
      if (!r.ok) return;
      const d = await r.json();
      if (d.running) {
        startBtn.style.display = 'none';
        stopBtn.style.display = '';
        drainBadge.style.display = '';
        const ap = d.auto_promote ? ' · auto-promote' : '';
        drainBadge.className = 'drain-status';
        drainBadge.textContent = `draining: ${d.dispatched} dispatched`
          + (d.promoted ? `, ${d.promoted} promoted` : '')
          + (d.failures ? `, ${d.failures} failed` : '')
          + ap;
      } else {
        startBtn.style.display = '';
        stopBtn.style.display = 'none';
        drainBadge.style.display = 'none';
      }
    } catch {}
  }
  refreshBoardStatus();
  setInterval(refreshBoardStatus, 3000);

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;
    try {
      const auto = autoPromoteToggle.checked ? '1' : '0';
      const r = await fetch(
        `/api/boards/${encodeURIComponent(pairKey)}/start?auto_promote=${auto}`,
        { method: 'POST' });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error(err.error || ('HTTP ' + r.status));
      }
      const d = await r.json();
      showToast(`Drainer started${d.auto_promote ? ' (auto-promote)' : ''}`, 'ok');
      refreshBoardStatus();
    } catch (err) {
      showToast(`Start failed: ${err.message}`, 'error');
    } finally {
      startBtn.disabled = false;
    }
  });

  stopBtn.addEventListener('click', async () => {
    stopBtn.disabled = true;
    try {
      const r = await fetch(`/api/boards/${encodeURIComponent(pairKey)}/stop`,
        { method: 'POST' });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error(err.error || ('HTTP ' + r.status));
      }
      showToast('Drainer stopped', 'ok');
      refreshBoardStatus();
    } catch (err) {
      showToast(`Stop failed: ${err.message}`, 'error');
    } finally {
      stopBtn.disabled = false;
    }
  });

  // --- New-card modal ----------------------------------------------------
  const createModal = document.getElementById('create-modal');
  const createBackdrop = document.getElementById('modal-backdrop');
  const createForm = document.getElementById('create-form');
  const createErr = document.getElementById('cf-err');
  const createSubmit = document.getElementById('cf-submit');
  const cfPairKeyDisplay = document.getElementById('cf-pair-key-display');

  function openCreateModal() {
    createErr.classList.remove('show');
    createErr.textContent = '';
    createForm.reset();
    document.getElementById('cf-pair-key').value = pairKey;
    cfPairKeyDisplay.textContent = pairKey;
    createModal.classList.add('open');
    createModal.setAttribute('aria-hidden', 'false');
    createBackdrop.classList.add('open');
    setTimeout(() => document.getElementById('cf-title').focus(), 30);
  }
  function closeCreateModal() {
    createModal.classList.remove('open');
    createModal.setAttribute('aria-hidden', 'true');
    createBackdrop.classList.remove('open');
  }

  document.getElementById('btn-new-card').addEventListener('click', openCreateModal);
  document.getElementById('create-modal-close').addEventListener('click', closeCreateModal);
  document.getElementById('cf-cancel').addEventListener('click', closeCreateModal);
  createBackdrop.addEventListener('click', closeCreateModal);

  // Extend the existing Escape handler — close create modal first if open,
  // otherwise drawer.
  const escHandlerEl = document;
  escHandlerEl.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    if (createModal.classList.contains('open')) {
      closeCreateModal();
      e.stopImmediatePropagation();
    }
  }, true /* capture, so we run before the drawer's handler */);

  createForm.addEventListener('submit', async e => {
    e.preventDefault();
    createErr.classList.remove('show');
    createSubmit.disabled = true;
    const payload = {
      pair_key:   pairKey,
      title:      document.getElementById('cf-title').value.trim(),
      body:       document.getElementById('cf-body').value,
      needs_role: document.getElementById('cf-needs-role').value.trim(),
      priority:   parseInt(document.getElementById('cf-priority').value, 10) || 0,
      created_by: document.getElementById('cf-created-by').value.trim() || 'owner',
    };
    try {
      const resp = await fetch('/api/cards', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error || ('HTTP ' + resp.status));
      }
      const card = await resp.json();
      closeCreateModal();
      showToast(`Created #${card.id} — ${card.title}`, 'ok');
      refresh();
    } catch (err) {
      createErr.textContent = err.message;
      createErr.classList.add('show');
    } finally {
      createSubmit.disabled = false;
    }
  });

  // --- Drawer dedup state ------------------------------------------------
  // Track the last-rendered drawer signature so polling skips renders
  // that wouldn't change anything visible. Reset on drawer open so the
  // first render after open always paints.
  let lastDrawerSig = null;
  let lastActivitySig = null;
  function drawerSig(c) {
    // Mutable fields the drawer actually displays. Order matters in JSON.
    return JSON.stringify([
      c.status, c.claimed_by || '', c.body || '', c.title,
      c.priority, c.needs_role || '', c.ready,
      (c.blocker_ids || []).join(','),
      (c.blockee_ids || []).join(','),
    ]);
  }

  // --- Drawer activity panel (timeline + composer) -----------------------
  const ACTIVITY_GLYPH = {
    comment:       '💬',
    status_change: '▸',
    claim:         '◉',
    body_update:   '✎',
    run_dispatch:  '▶',
    run_complete:  '✓',
  };

  function renderActivityRow(e) {
    const glyph = ACTIVITY_GLYPH[e.kind] || '·';
    let body = esc(e.body || '');
    // Run dispatch carries the log path in meta — surface it as a copyable hint.
    if (e.kind === 'run_dispatch' && e.meta && e.meta.log_path) {
      body += ` <span class="meta-link">tail -f ${esc(e.meta.log_path)}</span>`;
    }
    return `<div class="activity-row ${e.kind}">
      <span class="glyph">${glyph}</span>
      <span class="who">${esc(e.author)}</span>
      <span class="body">${body}</span>
      <span class="ts">${esc(fmtTs(e.created_at))}</span>
    </div>`;
  }

  async function refreshActivity(cardId) {
    const list = document.getElementById('activity-list');
    const count = document.getElementById('activity-count');
    if (!list || !count) return;
    try {
      const r = await fetch(`/api/cards/${cardId}/events`, { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      const events = data.events || [];
      // Dedup: if the event-id sequence hasn't changed, skip the
      // innerHTML rewrite to preserve scroll position.
      const sig = events.map(e => e.id).join(',');
      if (sig === lastActivitySig) return;
      lastActivitySig = sig;
      count.textContent = events.length;
      if (events.length === 0) {
        list.innerHTML = '<div class="activity-empty">No activity yet. Be the first to comment.</div>';
      } else {
        // Newest at the bottom (chronological feed). Preserve scroll
        // position; auto-scroll to bottom only if the user was already
        // pinned there (within 12px slop for sub-pixel rounding).
        const prevTop = list.scrollTop;
        const wasAtBottom = (list.scrollHeight - list.scrollTop - list.clientHeight) < 12;
        list.innerHTML = events.map(renderActivityRow).join('');
        list.scrollTop = wasAtBottom ? list.scrollHeight : prevTop;
      }
    } catch (err) {
      list.innerHTML = `<div class="activity-empty">activity load failed: ${esc(err.message)}</div>`;
    }
  }

  async function postComment(cardId) {
    const ta = document.getElementById('comment-input');
    const authorEl = document.getElementById('comment-author');
    const btn = document.getElementById('comment-submit');
    if (!ta || !authorEl || !btn) return;
    const body = ta.value.trim();
    if (!body) return;
    btn.disabled = true;
    try {
      const resp = await fetch(`/api/cards/${cardId}/comment`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ body, author: authorEl.value.trim() || 'owner' }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error || ('HTTP ' + resp.status));
      }
      ta.value = '';
      await refreshActivity(cardId);
      const list = document.getElementById('activity-list');
      if (list) list.scrollTop = list.scrollHeight;
    } catch (err) {
      showToast(`Comment failed: ${err.message}`, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  drawer.addEventListener('click', e => {
    if (e.target.closest('#comment-submit') && openCardId !== null) {
      postComment(openCardId);
    }
  });
  drawer.addEventListener('keydown', e => {
    const ta = e.target.closest('#comment-input');
    if (ta && (e.metaKey || e.ctrlKey) && e.key === 'Enter' && openCardId !== null) {
      e.preventDefault();
      postComment(openCardId);
    }
  });

  // --- Drawer context resolver -------------------------------------------
  function fmtBytes(n) {
    if (n < 1024) return n + ' B';
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
    return (n / (1024 * 1024)).toFixed(2) + ' MB';
  }

  function renderCtxFile(f) {
    const meta = `${fmtBytes(f.bytes || 0)}` + (f.truncated ? ' (truncated)' : '');
    const err = f.error
      ? `<span class="ctx-err">${esc(f.error)}</span>`
      : '';
    const content = f.content
      ? `<details><summary>show content</summary><pre>${esc(f.content)}</pre></details>`
      : '';
    return `<div class="ctx-item">
      <span class="ctx-key">${esc(f.path)}</span>
      <span class="ctx-meta">${meta}</span>${err}${content}
    </div>`;
  }
  function renderCtxURL(u) {
    const meta = `${fmtBytes(u.bytes || 0)}${u.content_type ? ' · ' + esc(u.content_type.split(';')[0]) : ''}`
      + (u.truncated ? ' (truncated)' : '');
    const err = u.error
      ? `<span class="ctx-err">${esc(u.error)}</span>`
      : '';
    const content = u.content
      ? `<details><summary>show content</summary><pre class="wrap">${esc(u.content)}</pre></details>`
      : '';
    return `<div class="ctx-item">
      <span class="ctx-key">${esc(u.url)}</span>
      <span class="ctx-meta">${meta}</span>${err}${content}
    </div>`;
  }
  function renderCtxMsg(m) {
    if (m.error) {
      return `<div class="ctx-item">
        <span class="ctx-key">#${m.id}</span>
        <span class="ctx-err">${esc(m.error)}</span>
      </div>`;
    }
    return `<div class="ctx-item">
      <span class="ctx-key">#${m.id}</span>
      <span class="ctx-meta">${esc(m.from)} → ${esc(m.to)} · ${esc(fmtTs(m.created_at))}</span>
      <details><summary>show body</summary><pre class="wrap">${esc(m.body)}</pre></details>
    </div>`;
  }
  function renderCtxCard(c) {
    if (c.error) {
      return `<div class="ctx-item">
        <span class="ctx-key">#${c.id}</span>
        <span class="ctx-err">${esc(c.error)}</span>
      </div>`;
    }
    return `<div class="ctx-item">
      <span class="ctx-key">#${c.id}</span>
      <span class="ctx-meta">${esc(c.status)}${c.needs_role ? ' · needs ' + esc(c.needs_role) : ''}</span>
      ${c.title ? `<div style="margin-top:3px;color:var(--fg-primary);font-weight:510">${esc(c.title)}</div>` : ''}
      ${c.body ? `<details><summary>show body</summary><pre class="wrap">${esc(c.body)}</pre></details>` : ''}
    </div>`;
  }

  function renderCtxBundle(data) {
    const sections = [
      ['files',   'Files',         data.files   || [], renderCtxFile],
      ['urls',    'URLs',          data.urls    || [], renderCtxURL],
      ['msg_ids', 'Inbox messages', data.msg_ids || [], renderCtxMsg],
      ['cards',   'Predecessor cards', data.cards || [], renderCtxCard],
    ];
    const total = sections.reduce((a, [, , arr]) => a + arr.length, 0);
    if (total === 0) {
      return '<div class="ctx-empty">No refs to resolve.</div>';
    }
    return sections.map(([key, label, items, fn]) => {
      if (items.length === 0) return '';
      return `<div class="ctx-section open" data-section="${key}">
        <div class="ctx-section-head">
          <span class="chevron">▸</span>
          <span class="label">${label}</span>
          <span class="count">${items.length}</span>
        </div>
        <div class="ctx-section-body">${items.map(fn).join('')}</div>
      </div>`;
    }).join('');
  }

  async function resolveContext(cardId) {
    const stats = document.getElementById('ctx-stats');
    const body = document.getElementById('ctx-body');
    if (!stats || !body) return;
    stats.textContent = 'resolving…';
    body.innerHTML = '<div class="ctx-empty">Loading…</div>';
    try {
      const r = await fetch(`/api/cards/${cardId}/context`, { cache: 'no-store' });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error(err.error || ('HTTP ' + r.status));
      }
      const data = await r.json();
      body.innerHTML = renderCtxBundle(data);
      stats.textContent = fmtBytes(data.total_bytes || 0) + ' resolved';
    } catch (err) {
      stats.textContent = 'error';
      body.innerHTML = `<div class="ctx-empty"><span class="ctx-err">${esc(err.message)}</span></div>`;
    }
  }

  drawer.addEventListener('click', async e => {
    if (e.target.closest('#ctx-resolve') && openCardId !== null) {
      resolveContext(openCardId);
      return;
    }
    const head = e.target.closest('.ctx-section-head');
    if (head) {
      head.parentElement.classList.toggle('open');
      return;
    }
    const runBtn = e.target.closest('#drawer-run');
    if (runBtn && openCardId !== null) {
      runBtn.disabled = true;
      runBtn.textContent = 'Spawning…';
      try {
        const r = await fetch(`/api/cards/${openCardId}/run`, { method: 'POST' });
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          throw new Error(err.error || ('HTTP ' + r.status));
        }
        const data = await r.json();
        showToast(`Worker ${data.worker_label} (pid ${data.pid}) dispatched`, 'ok');
        // Inject a banner into the drawer body so the user has the log path
        // even after the next 3s refresh re-renders the drawer.
        const body = drawer.querySelector('.db');
        if (body) {
          const banner = document.createElement('div');
          banner.className = 'run-banner';
          banner.innerHTML = `
            <strong>Worker dispatched</strong> as <span class="label-pill">${esc(data.worker_label)}</span>
            (pid ${data.pid}). Watch progress:
            <span class="log-cmd">tail -f ${esc(data.log_path)}</span>
            Card status will flip to <strong>in_review</strong> on success or
            back to <strong>todo</strong> with a BLOCKED annotation if the spec
            is too thin. Refresh in 30–90 seconds.`;
          body.insertBefore(banner, body.firstChild);
        }
        // Trigger a refresh so the optimistic in_progress + claimed_by show.
        refresh();
      } catch (err) {
        showToast(`Run failed: ${err.message}`, 'error');
        runBtn.disabled = false;
        runBtn.innerHTML = '<span class=glyph>▶</span> Run';
      }
    }
  });

  // --- Drawer body inline edit -------------------------------------------
  // Click the "edit" link next to the body label → swap in a textarea +
  // Save / Cancel. Save POSTs to /api/cards/{id}/update with {body}.
  drawer.addEventListener('click', async e => {
    const editBtn = e.target.closest('.edit-link');
    if (editBtn && editBtn.dataset.action === 'edit-body' && openCardId !== null) {
      const cur = (lastData.cards || []).find(c => c.id === openCardId);
      if (!cur) return;
      const wrap = drawer.querySelector('.body-edit-target');
      if (!wrap) return;
      wrap.innerHTML = `
        <div class="body-edit-wrap">
          <textarea id="drawer-body-edit">${esc(cur.body || '')}</textarea>
          <div class="edit-actions">
            <button type="button" class="btn ghost" data-action="cancel-body" style="font-family:inherit;font-size:12px;font-weight:510;padding:6px 14px;border-radius:6px;cursor:pointer;background:rgba(255,255,255,0.02);color:var(--fg-secondary);border:1px solid var(--border-standard)">Cancel</button>
            <button type="button" class="btn primary" data-action="save-body" style="font-family:inherit;font-size:12px;font-weight:510;padding:6px 14px;border-radius:6px;cursor:pointer;background:var(--accent);color:#fff;border:1px solid rgba(255,255,255,0.12)">Save</button>
          </div>
        </div>`;
      const ta = wrap.querySelector('#drawer-body-edit');
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
      return;
    }
    const cancel = e.target.closest('[data-action="cancel-body"]');
    if (cancel && openCardId !== null) {
      const cur = (lastData.cards || []).find(c => c.id === openCardId);
      if (cur) {
        const byId = Object.fromEntries((lastData.cards || []).map(c => [c.id, c]));
        renderDrawer(cur, byId);
      }
      return;
    }
    const save = e.target.closest('[data-action="save-body"]');
    if (save && openCardId !== null) {
      const ta = drawer.querySelector('#drawer-body-edit');
      if (!ta) return;
      const newBody = ta.value;
      save.disabled = true;
      try {
        const resp = await fetch(`/api/cards/${openCardId}/update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ body: newBody }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.error || ('HTTP ' + resp.status));
        }
        showToast(`#${openCardId} body updated`, 'ok');
        await refresh();
      } catch (err) {
        showToast(`Save failed: ${err.message}`, 'error');
      } finally {
        save.disabled = false;
      }
    }
  });
})();
</script>
